<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pictefor — Reset Password</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 480px;
      width: 100%;
      padding: 48px 40px;
    }
    
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .logo h1 {
      font-size: 32px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 8px;
    }
    
    .logo p {
      color: #6B7280;
      font-size: 14px;
    }
    
    .success {
      text-align: center;
      padding: 20px 0;
    }
    
    .success-icon {
      width: 80px;
      height: 80px;
      background: #10B981;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: scaleIn 0.3s ease-out;
    }
    
    .success-icon svg {
      width: 48px;
      height: 48px;
      stroke: white;
    }
    
    .success h2 {
      font-size: 24px;
      color: #111827;
      margin-bottom: 12px;
    }
    
    .success p {
      color: #6B7280;
      font-size: 14px;
      line-height: 1.6;
    }
    
    .button {
      display: inline-block;
      background: linear-gradient(135deg, #2563EB 0%, #1E40AF 100%);
      color: white;
      padding: 14px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      margin-top: 24px;
      transition: transform 0.2s, box-shadow 0.2s;
      border: none;
      cursor: pointer;
    }
    
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
    }
    
    .loading {
      text-align: center;
      padding: 40px 20px;
    }
    
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #E5E7EB;
      border-top-color: #2563EB;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    .error {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 8px;
      padding: 16px;
      margin: 20px 0;
    }
    
    .error p {
      color: #991B1B;
      font-size: 14px;
      margin: 0;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @keyframes scaleIn {
      from {
        transform: scale(0);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
    
    .footer {
      text-align: center;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #E5E7EB;
      color: #9CA3AF;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>🔐 Pictefor</h1>
      <p>Reset Your Password</p>
    </div>
    
    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>Processing your request...</p>
      </div>
    </div>
    
    <div class="footer">
      © 2026 Pictefor. All rights reserved.
    </div>
  </div>

  <script>
    // Parse the hash fragment (Supabase puts tokens there)
    const hash = window.location.hash.substring(1); // Remove the #
    const hashParams = new URLSearchParams(hash);
    
    const accessToken = hashParams.get('access_token');
    const type = hashParams.get('type');
    const tokenType = hashParams.get('token_type');
    
    console.log('[Password Reset] Hash:', hash);
    console.log('[Password Reset] Access Token:', accessToken ? 'Present (' + accessToken.length + ' chars)' : 'Missing');
    console.log('[Password Reset] Type:', type);
    
    // Check if this is a valid password reset link
    if (accessToken && type === 'recovery') {
      // Store token for potential desktop app redirect
      localStorage.setItem('pictefor_reset_token', accessToken);
      
      // Show success message
      document.getElementById('content').innerHTML = `
        <div class="success">
          <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
            </svg>
          </div>
          <h2>Password Reset Successful!</h2>
          <p>Your password has been updated successfully. You can now return to the Pictefor desktop app and sign in with your new password.</p>
          <a href="pictefor://auth-callback?token=${encodeURIComponent(accessToken)}" class="button">Open Pictefor App</a>
          <p style="margin-top: 16px; font-size: 12px; color: #9CA3AF;">
            Or <a href="https://thekleee.github.io/pictefor-tos/" style="color: #2563EB;">return to homepage</a>
          </p>
        </div>
      `;
      
      // Try to redirect to desktop app after 3 seconds
      setTimeout(() => {
        window.location.href = `pictefor://auth-callback?token=${encodeURIComponent(accessToken)}`;
      }, 3000);
      
    } else if (accessToken) {
      // Has token but no type - might still be valid
      document.getElementById('content').innerHTML = `
        <div class="success">
          <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
            </svg>
          </div>
          <h2>Link Validated!</h2>
          <p>Your password reset link is valid. If you've already set a new password, you can open the desktop app.</p>
          <a href="pictefor://auth-callback?token=${encodeURIComponent(accessToken)}" class="button">Open Pictefor App</a>
        </div>
      `;
    } else {
      // No access token - show error
      document.getElementById('content').innerHTML = `
        <div class="error">
          <p><strong>Invalid or expired link</strong></p>
          <p style="margin-top: 8px;">This password reset link is invalid or has expired. Please request a new password reset from the Pictefor app.</p>
          <p style="margin-top: 8px; font-size: 11px; color: #999;">Debug: type=${type}, hasToken=${!!accessToken}</p>
        </div>
        <div style="text-align: center; margin-top: 24px;">
          <a href="https://thekleee.github.io/pictefor-tos/" class="button">Go to Homepage</a>
        </div>
      `;
    }
  </script>
</body>
</html>
